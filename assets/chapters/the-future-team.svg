<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" class="drawing" role="img"
     aria-label="Contour lines running in from the left and stopping partway across: the map's undrawn edge.">

  <!-- The one drawing in the site whose strokes never finish. Two pillars
       stand, two are under construction, and the belief that sits here is
       still waiting for its impact point — so the terrain stops. -->
