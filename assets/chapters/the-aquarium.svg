    <radialGradient id="seed" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" class="seed-in"/>
      <stop offset="1" class="seed-out"/>
    </radialGradient>
  </defs>

  <!-- the second of the two seeds: the only other warm light in era-was -->
