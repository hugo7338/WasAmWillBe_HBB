  <path pathLength="1" d="M 350 256 L 350 244 L 424 244 L 424 256"/>
  <path pathLength="1" d="M 356 244 L 356 232 L 418 232 L 418 244"/>
  <path pathLength="1" d="M 352 262 L 422 262"/>
  <path pathLength="1" d="M 358 250 L 416 250"/>
