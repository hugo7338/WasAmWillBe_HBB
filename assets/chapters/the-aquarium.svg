  <path pathLength="1" d="M 40 268 L 450 268"/>

  <!-- the tank -->
  <path pathLength="1" d="M 100 96 L 320 96 L 320 232 L 100 232 Z"/>
  <path pathLength="1" d="M 108 118 C 140 113 180 120 214 115 C 250 110 288 117 312 114"/>
  <path pathLength="1" d="M 104 218 C 140 209 180 214 214 209 C 250 204 288 211 316 207"/>

