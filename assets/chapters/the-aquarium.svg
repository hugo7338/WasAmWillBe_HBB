  <path pathLength="1" d="M 146 224 C 143 202 150 184 157 168"/>
  <path pathLength="1" d="M 288 222 C 294 202 287 182 280 166"/>
  <path pathLength="1" d="M 274 224 C 278 206 273 190 268 178"/>

