  <path pathLength="1" d="M 190 150 L 178 143 L 178 157 Z"/>
  <path pathLength="1" d="M 252 180 m -9 0 a 9 5.5 0 1 0 18 0 a 9 5.5 0 1 0 -18 0"/>
